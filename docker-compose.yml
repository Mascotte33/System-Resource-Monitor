services:
  prometheus:
    image: prom/prometheus:latest
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - ./infra/prometheus/alert_rules.yml:/etc/prometheus/alert_rules.yml
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "9090:9090"
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    restart: unless-stopped

  alertmanager:
    image: prom/alertmanager:latest
    volumes:
      - ./infra/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml
      - ./infra/alertmanager/discord_webhook.txt:/etc/alertmanager/discord_webhook.txt
    ports:
      - "9093:9093"
    restart: unless-stopped

  system_monitor:
    image: system_monitor
    env_file:
      - .env
    ports:
      - "8000:8000"
    restart: unless-stopped

volumes:
  prometheus_data: {}
  grafana_data: {}
  alertmanager_data: {}
